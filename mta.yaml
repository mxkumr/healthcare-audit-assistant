resources:
- name: healthcare-audit-assistant-auth
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      oauth2-configuration:
        credential-types:
        - binding-secret
        - x509
        redirect-uris:
        - https://*~{app-api/app-uri}/**
      role-collections:
      - description: generated
        name: admin (healthcare-audit-assistant ${org}-${space})
        role-template-references:
        - $XSAPPNAME.admin
      - description: Medicare audit analyst for Joule and OData read access
        name: audit_analyst (healthcare-audit-assistant ${org}-${space})
        role-template-references:
        - $XSAPPNAME.audit_analyst
      tenant-mode: dedicated
      xsappname: healthcare-audit-assistant-${org}-${space}
    path: ./xs-security.json
    service: xsuaa
    service-plan: application
  requires:
  - name: app-api
- name: healthcare-audit-assistant-db
  type: com.sap.xs.hdi-container
  parameters:
    service: hana
    service-plan: hdi-shared
- name: healthcare-audit-assistant-html5-runtime
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-plan: app-runtime
- name: healthcare-audit-assistant-repo-host
  type: org.cloudfoundry.managed-service
  parameters:
    service: html5-apps-repo
    service-name: healthcare-audit-assistant-html5-service
    service-plan: app-host
- name: healthcare-audit-assistant-destination-service
  type: org.cloudfoundry.managed-service
  parameters:
    config:
      HTML5Runtime_enabled: true
      init_data:
        instance:
          destinations:
          - Authentication: NoAuthentication
            Name: ui5
            ProxyType: Internet
            Type: HTTP
            URL: https://ui5.sap.com
          existing_destinations_policy: update
      version: 1.0.0
    service: destination
    service-name: healthcare-audit-assistant-destination-service
    service-plan: lite
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
  - builder: custom
    commands:
    - npm ci
    - node scripts/ensure-mbt.js
    - node scripts/sanitize-csv-for-hana.js
    - node scripts/fix-html5-bootstrap.js
    - node scripts/ensure-html5-deploy.js
    - npx cds build --production
