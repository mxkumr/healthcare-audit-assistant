_schema-version: 3.3.0
ID: healthcare-audit-assistant
description: A simple CAP project.
version: 1.0.0
modules:
- name: healthcare-audit-assistant-srv
  type: nodejs
  path: gen/srv
  requires:
  - name: healthcare-audit-assistant-auth
  - name: healthcare-audit-assistant-db
  provides:
  - name: srv-api
    properties:
      srv-url: ${default-url}
  parameters:
    buildpack: nodejs_buildpack
    instances: 1
  build-parameters:
    builder: npm-ci
- name: healthcare-audit-assistant-db-deployer
  type: hdb
  path: gen/db
  requires:
  - name: healthcare-audit-assistant-db
  parameters:
    buildpack: nodejs_buildpack
- name: healthcare-audit-assistant
  type: approuter.nodejs
  path: app/router
  requires:
  - name: srv-api
    group: destinations
    properties:
      forwardAuthToken: true
      name: srv-api
      url: ~{srv-url}
  - name: healthcare-audit-assistant-auth
  - name: healthcare-audit-assistant-html5-runtime
  - name: healthcare-audit-assistant-destination-service
    group: destinations
    properties:
      forwardAuthToken: false
      name: ui5
      url: https://ui5.sap.com
  provides:
  - name: app-api
    properties:
      app-protocol: ${protocol}
      app-uri: ${default-uri}
  parameters:
    disk-quota: 256M
    keep-existing-routes: true
    memory: 256M
- name: healthcare-audit-assistant-app-content
  type: com.sap.application.content
  path: .
  requires:
  - name: healthcare-audit-assistant-repo-host
    parameters:
      content-target: true
  build-parameters:
    build-result: resources
    requires:
    - artifacts:
      - commedicareaudithome.zip
      name: commedicareaudithome
      target-path: resources/
    - artifacts:
      - commedicaretask1overview.zip
      name: commedicaretask1overview
      target-path: resources/
    - artifacts:
      - commedicaretask2overview.zip
      name: commedicaretask2overview
      target-path: resources/
    - artifacts:
      - commedicaretask3overview.zip
      name: commedicaretask3overview
      target-path: resources/
    - artifacts:
      - commedicare11costanalysis.zip
      name: commedicare11costanalysis
      target-path: resources/
    - artifacts:
      - commedicare12ruralanalysis.zip
      name: commedicare12ruralanalysis
      target-path: resources/
    - artifacts:
      - commedicare13behavioralhelathrisk.zip
      name: commedicare13behavioralhelathrisk
      target-path: resources/
    - artifacts:
      - commedicare21providerclassification.zip
      name: commedicare21providerclassification
      target-path: resources/
    - artifacts:
      - commedicare22aspecialtyprofiling.zip
      name: commedicare22aspecialtyprofiling
      target-path: resources/
    - artifacts:
      - commedicare22borganizationprofiling.zip
      name: commedicare22borganizationprofiling
      target-path: resources/
    - artifacts:
      - commedicare31riskdynamics.zip
      name: commedicare31riskdynamics
      target-path: resources/
    - artifacts:
      - commedicare32placeofservice.zip
      name: commedicare32placeofservice
      target-path: resources/
    - artifacts:
      - commedicare33credentialdiscrepancies.zip
      name: commedicare33credentialdiscrepancies
      target-path: resources/
    - artifacts:
      - commedicareriskanalysis.zip
      name: commedicareriskanalysis
      target-path: resources/
- name: commedicareaudithome
  type: html5
  path: app/audit-home
  build-parameters:
    build-result: dist
    builder: custom
    commands:
    - npm install
    - npm run build:cf
    supported-platforms: []
