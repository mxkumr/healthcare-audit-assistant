<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Medicare Analytics Overview</title>
    <style>
        html, body, body > div, #container, #container-uiarea {
            height: 100%;
        }
    </style>
    <script
        id="sap-ui-bootstrap"
        src="https://sapui5.hana.ondemand.com/1.148.1/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon_dark"
        data-sap-ui-libs="sap.m,sap.tnt,sap.f,sap.ui.layout,sap.ui.core,sap.viz,sap.suite.ui.microchart,sap.ui.vbm"
        data-sap-ui-resource-roots='{
            "com.medicare.auditdashboard": "./"
        }'
        data-sap-ui-on-init="module:sap/ui/core/ComponentSupport"
        data-sap-ui-compat-version="edge"
        data-sap-ui-async="true"
        data-sap-ui-frame-options="trusted"
    ></script>
</head>
<body class="sapUiBody" id="content">
    <div
        data-sap-ui-component
        data-name="com.medicare.auditdashboard"
        data-id="container"
        data-settings='{"id" : "com.medicare.auditdashboard"}'
        data-handle-validation="true"
    ></div>
</body>
</html>
